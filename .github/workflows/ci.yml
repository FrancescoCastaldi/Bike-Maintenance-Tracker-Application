name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ============================================
  # JOB 1: Build & Test C
  # ============================================
  build-c:
    name: "C Build | ${{ matrix.os }} | ${{ matrix.compiler }}"
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        compiler: [ gcc, clang ]
        exclude:
          - os: windows-latest
            compiler: clang

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup compiler (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
          fi

      - name: 🔧 Setup compiler (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "CC=gcc" >> $GITHUB_ENV
        shell: bash

      - name: 🏗️ Compile C application
        run: |
          $CC -std=c11 -Wall -Wextra -O2 -o bike_track src/bike_track.c
          echo "✅ Compilation successful"
        shell: bash

      - name: 🧪 Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          echo "1" | timeout 5 ./bike_track || true
          echo "✅ Smoke test passed"
        shell: bash

      - name: 🧪 Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "1" | ./bike_track.exe
          echo "✅ Smoke test passed"
        shell: bash

      - name: 📦 Upload C binary (Linux only)
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: bike_track-linux
          path: bike_track
          retention-days: 7

      - name: 📦 Upload C binary (Windows only)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: bike_track-windows
          path: bike_track.exe
          retention-days: 7

      - name: 📦 Upload C binary (macOS only)
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: bike_track-macos
          path: bike_track
          retention-days: 7

  # ============================================
  # JOB 2: Python Setup & Lint
  # ============================================
  python-check:
    name: "Python Setup & Lint"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint pytest

      - name: 🔍 Lint Python code
        run: |
          pylint src/bike_maintenance_gui.py --exit-zero
        continue-on-error: true

      - name: 🧹 Clean any residual files from root
        run: |
          if [ -f "bike_maintenance_gui.py" ]; then
            echo "⚠️  Found residual file in root, removing..."
            rm bike_maintenance_gui.py
          fi
          echo "✅ Root directory clean"
          
  
      - name: 🧪 Test GUI import
        run: |
          cd src
          python -c "import bike_maintenance_gui; print('✅ GUI module loads successfully')"

  # ============================================
  # JOB 3: Create Release Draft (solo su tag)
  # ============================================
  release:
    name: "Draft Release"
    needs: [ build-c, python-check ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/bike_track-linux/bike_track
            artifacts/bike_track-windows/bike_track.exe
            artifacts/bike_track-macos/bike_track
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
